[project]
name = "zahir2"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.15"
dependencies = [
    "psutil>=7.2.2",
    "rich>=13.0.0",
]

[dependency-groups]
dev = [
    "orbis",
    "pyright>=1.1.408",
    "pytest",
    "pytest-cov>=7.1.0",
    "tertius",
    "time-machine",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.ruff.lint]
select = ["E402"]

[tool.uv.sources]
orbis = { path = "../orbis" }
tertius = { path = "../uqbar" }
